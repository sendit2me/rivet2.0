name: Stable Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rivet-docs-pages
  cancel-in-progress: false

jobs:
  build-windows:
    name: Stable Windows desktop bundle
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target

      - name: Install dependencies
        run: yarn --immutable

      - name: Sync desktop version metadata
        run: yarn sync:desktop-version

      - name: Build desktop web dependencies
        run: yarn build:hosted-web-deps
        env:
          NODE_OPTIONS: --max-old-space-size=6000

      - name: Build Tauri Windows bundle
        working-directory: packages/app
        run: yarn tauri build --verbose --ci --bundles "msi,nsis"
        env:
          NODE_OPTIONS: --max-old-space-size=6000

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v7
        with:
          name: rivet-official-windows-bundles
          path: packages/app/src-tauri/target/release/bundle
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Stable macOS desktop bundle
    if: github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yarn

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target

      - name: Install dependencies
        run: yarn --immutable

      - name: Sync desktop version metadata
        run: yarn sync:desktop-version

      - name: Build desktop web dependencies
        run: yarn build:hosted-web-deps
        env:
          NODE_OPTIONS: --max-old-space-size=6000

      - name: Prepare Apple signing and notarization
        run: bash .github/scripts/prepare-macos-signing-env.sh
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      - name: Build Tauri macOS bundle
        working-directory: packages/app
        run: yarn tauri build --verbose --ci --target universal-apple-darwin --bundles "dmg"
        env:
          NODE_OPTIONS: --max-old-space-size=6000
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Notarize macOS DMG
        run: bash .github/scripts/notarize-macos-dmg.sh
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}

      - name: Verify macOS signing and notarization
        run: bash .github/scripts/verify-macos-dmg.sh

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v7
        with:
          name: rivet-official-macos-bundles
          path: packages/app/src-tauri/target/universal-apple-darwin/release/bundle
          if-no-files-found: error
          retention-days: 7

  build-docs:
    name: Stable documentation site
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-yarn

      - name: Install dependencies
        run: yarn --immutable

      - name: Build documentation site
        run: node .yarn/releases/yarn-4.6.0.cjs workspace docs run build
        env:
          NODE_OPTIONS: --max-old-space-size=6000

      - name: Upload documentation site
        uses: actions/upload-artifact@v7
        with:
          name: rivet-stable-docs-site
          path: packages/docs/build
          if-no-files-found: error
          retention-days: 7

  build-pages:
    name: Stable desktop download page
    if: github.ref == 'refs/heads/main'
    needs:
      - build-windows
      - build-macos
      - build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20.4.x'

      - name: Sync desktop version metadata
        run: node scripts/sync-desktop-version.mjs

      - name: Download documentation site
        uses: actions/download-artifact@v7
        with:
          name: rivet-stable-docs-site
          path: packages/docs/build

      - name: Download Windows bundles
        uses: actions/download-artifact@v7
        with:
          name: rivet-official-windows-bundles
          path: release-bundles/windows

      - name: Download macOS bundles
        uses: actions/download-artifact@v7
        with:
          name: rivet-official-macos-bundles
          path: release-bundles/macos

      - name: Add stable release downloads to docs site
        run: node .github/scripts/prepare-desktop-release-pages.mjs
        env:
          RELEASE_CHANNEL: official
          RELEASE_LABEL: official-${{ github.run_number }}-${{ github.sha }}
          RELEASE_PLATFORMS: windows,macos
          PRESERVE_RELEASE_METADATA_FILES: developer-release.json
          PAGES_SITE_URL: https://valerypopoff.github.io/rivet2.0/
          PAGES_OUT_DIR: packages/docs/build
          WINDOWS_BUNDLE_DIR: release-bundles/windows
          MACOS_BUNDLE_DIR: release-bundles/macos

      - name: Upload Pages content
        uses: actions/upload-artifact@v7
        with:
          name: rivet-docs-pages
          path: packages/docs/build
          if-no-files-found: error
          retention-days: 7

  publish-pages:
    name: Publish stable desktop downloads
    if: github.ref == 'refs/heads/main'
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
    steps:
      - name: Download Pages content
        uses: actions/download-artifact@v7
        with:
          name: rivet-docs-pages
          path: rivet-docs-pages

      - name: Configure Pages
        if: env.PAGES_ENABLEMENT_TOKEN == ''
        uses: actions/configure-pages@v6

      - name: Configure Pages and enable site
        if: env.PAGES_ENABLEMENT_TOKEN != ''
        uses: actions/configure-pages@v6
        with:
          enablement: true
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: rivet-docs-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
