name: Release

on:
  push:
    branches:
      - windows-builds
    tags:
      - app-v*
jobs:
  build-release:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-22.04, ubuntu-22.04-arm]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-yarn
      # Make sure mac x64 gets the aarch64 toolchain too
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
        if: matrix.platform == 'macos-latest'
      # Otherwise just make sure rust is set up
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.platform != 'macos-latest'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri -> target

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-22.04')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: yarn --immutable
      - name: Build desktop web dependencies
        run: yarn build:hosted-web-deps
        env:
          NODE_OPTIONS: --max-old-space-size=6000
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/app
          tauriScript: yarn tauri
          tagName: app-v__VERSION__
          releaseName: 'Rivet 2 v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --verbose ${{ matrix.platform == 'macos-latest' && ' --target universal-apple-darwin' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NODE_OPTIONS: --max-old-space-size=6000
