name: Publish npm Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-npm-packages
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify clean checkout
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi

      - name: Set up build Node
        uses: actions/setup-node@v5
        with:
          node-version: '20.4.x'

      - name: Install dependencies
        run: node .yarn/releases/yarn-4.6.0.cjs install --immutable

      - name: Build publishable packages
        run: |
          node .yarn/releases/yarn-4.6.0.cjs workspace @valerypopoff/rivet2-core run build
          node .yarn/releases/yarn-4.6.0.cjs workspace @valerypopoff/rivet2-node run build
          node .yarn/releases/yarn-4.6.0.cjs workspace @valerypopoff/trivet run build
          node .yarn/releases/yarn-4.6.0.cjs workspace @valerypopoff/rivet2-cli run build

      - name: Verify package build changed only generated artifacts
        run: |
          status="$(git status --porcelain=v1 --untracked-files=all -- \
            . \
            ':!.pnp.cjs' \
            ':!.pnp.loader.mjs' \
            ':!.yarn/cache/**' \
            ':!.yarn/install-state.gz' \
            ':!packages/core/dist/**' \
            ':!packages/node/dist/**' \
            ':!packages/trivet/dist/**' \
            ':!packages/cli/dist/**' \
            ':!packages/cli/bin/**' \
            ':!packages/cli/tsconfig.tsbuildinfo')"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi

      - name: Set up publish Node
        uses: actions/setup-node@v5
        with:
          node-version: '22.14.x'
          registry-url: https://registry.npmjs.org

      - name: Install trusted-publishing capable npm
        run: npm install -g npm@11.5.1

      - name: Verify npm publish token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Missing NPM_TOKEN repository secret. Add an npm automation token under Settings > Secrets and variables > Actions. Local .env files are not available to GitHub Actions."
            exit 1
          fi

          npm_config="$RUNNER_TEMP/npm-publish-check.npmrc"
          printf 'registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > "$npm_config"
          npm whoami --registry https://registry.npmjs.org/ --userconfig "$npm_config"

      - name: Publish packages
        run: node scripts/publish-npm-packages.mjs --skip-clean-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
